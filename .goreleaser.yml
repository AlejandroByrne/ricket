project_name: ricket
version: 2
builds:
  - id: ricket
    main: ./cmd/ricket
    binary: ricket
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    env: [CGO_ENABLED=0]
archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
checksum:
  name_template: "checksums.txt"
