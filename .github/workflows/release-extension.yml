name: Release Extension

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: ricket-linux-x64
          - goos: linux
            goarch: arm64
            binary: ricket-linux-arm64
          - goos: darwin
            goarch: amd64
            binary: ricket-darwin-x64
          - goos: darwin
            goarch: arm64
            binary: ricket-darwin-arm64
          - goos: windows
            goarch: amd64
            binary: ricket-win32-x64.exe
          - goos: windows
            goarch: arm64
            binary: ricket-win32-arm64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -o vscode-extension/bin/${{ matrix.binary }} ./cmd/ricket
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: vscode-extension/bin/${{ matrix.binary }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go test ./...

  publish:
    needs: [build-binaries, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: vscode-extension/bin
          merge-multiple: true
      - name: Make binaries executable
        run: chmod +x vscode-extension/bin/*
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        working-directory: vscode-extension
        run: npm ci
      - name: Publish extension
        working-directory: vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish -p "$VSCE_PAT"
